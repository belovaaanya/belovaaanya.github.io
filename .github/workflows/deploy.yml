name: Deploy to GitHub Pages

# Replaces GitHub's default branch auto-deploy so we can retry the deploy step —
# Pages' deploy backend intermittently returns "Deployment failed, try again later".
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # Static site — upload the whole repo root as the Pages artifact.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploy with up to 3 attempts and backoff. Each retry runs only if the
      # previous attempt failed; the final attempt is allowed to fail the job.
      - name: Deploy (attempt 1)
        id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Backoff before attempt 2
        if: steps.d1.outcome == 'failure'
        run: sleep 30

      - name: Deploy (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Backoff before attempt 3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 60

      - name: Deploy (attempt 3, final)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
